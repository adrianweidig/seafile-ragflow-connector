  SEARCH_PDF_RENDER_MAX_MB: ${SEARCH_PDF_RENDER_MAX_MB:-25}
  SEARCH_ANSWER_MAX_SOURCES: ${SEARCH_ANSWER_MAX_SOURCES:-8}
