  SEARCH_ENABLE_RETRIEVAL_MODE: ${SEARCH_ENABLE_RETRIEVAL_MODE:-true}
  SEARCH_SOURCE_PREVIEW_ENABLED: ${SEARCH_SOURCE_PREVIEW_ENABLED:-true}
  SEARCH_SOURCE_HOVER_ENABLED: ${SEARCH_SOURCE_HOVER_ENABLED:-true}
  SEARCH_TEXT_FRAGMENT_LINKS_ENABLED: ${SEARCH_TEXT_FRAGMENT_LINKS_ENABLED:-true}
