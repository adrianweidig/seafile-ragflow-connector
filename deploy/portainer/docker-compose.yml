x-search-common: &search-common
  image: ${CONNECTOR_IMAGE:-ghcr.io/adrianweidig/seafile-ragflow-connector:latest}
  pull_policy: ${CONNECTOR_IMAGE_PULL_POLICY:-missing}
  restart: unless-stopped
  environment: *search-env
  extra_hosts:
    - "host.docker.internal:host-gateway"
  volumes:
    - type: bind
      source: ${CONNECTOR_CERTS_HOST_DIR:-./certs}
      target: /certs
      read_only: true
  networks:
    - connector-net
  healthcheck:
    test:
      - CMD-SHELL
      - >-
        python -c "import os, urllib.request;
        urllib.request.urlopen('http://127.0.0.1:%s/readyz' %
        os.getenv('SEARCH_SERVICE_PORT', '8090'), timeout=5).read()"
    interval: 30s
    timeout: 10s
    retries: 5
    start_period: 20s

services:
  # Persistenter Connector-State des statischen bundled-state-Profils.
  connector-postgres:
    image: ${POSTGRES_IMAGE:-postgres:16}
    pull_policy: ${POSTGRES_IMAGE_PULL_POLICY:-missing}
    environment:
      TZ: ${TZ:-Europe/Berlin}
      POSTGRES_DB: ${POSTGRES_DB:-seafile_ragflow_sync}
      POSTGRES_USER: ${POSTGRES_USER:-sync}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - connector-postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - connector-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 30

  connector-redis:
    image: ${REDIS_IMAGE:-redis:7}
    pull_policy: ${REDIS_IMAGE_PULL_POLICY:-missing}
    command: ["sh", "-c", "redis-server --appendonly yes || valkey-server --appendonly yes"]
    volumes:
      - connector-redis-data:/data
    restart: unless-stopped
    networks:
      - connector-net
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping || valkey-cli ping"]
      interval: 10s
      timeout: 5s
      retries: 30

  connector-controller:
    <<: *connector-common
    command: ["controller"]
    networks:
      connector-net:
        aliases:
          - connector-dashboard
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          python -c "import os, urllib.request;
          urllib.request.urlopen('http://127.0.0.1:%s/livez' %
          os.getenv('CONNECTOR_DASHBOARD_PORT', '8080'), timeout=5).read()"
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    ports:
      # Default ist nur lokal erreichbar. Für LAN/Reverse-Proxy-Exposition
      # CONNECTOR_DASHBOARD_AUTH_USERNAME/PASSWORD setzen.
      - "${CONNECTOR_DASHBOARD_PUBLISHED_PORT:-127.0.0.1:18080}:${CONNECTOR_DASHBOARD_PORT:-8080}"
    depends_on:
      connector-postgres:
        condition: service_healthy
      connector-redis:
        condition: service_healthy

  connector-worker:
    <<: *connector-common
    command: ["worker"]
    depends_on:
      connector-postgres:
        condition: service_healthy
      connector-redis:
        condition: service_healthy

  connector-reconciler:
    <<: *connector-common
    command: ["reconciler"]
    depends_on:
      connector-postgres:
        condition: service_healthy
      connector-redis:
        condition: service_healthy

  connector-search:
    <<: *search-common
    command: ["search-server"]
    cpus: ${SEARCH_CPU_LIMIT:-1.0}
    mem_limit: ${SEARCH_MEMORY_LIMIT:-512M}
    pids_limit: ${SEARCH_PIDS_LIMIT:-256}
    ports:
      - "${SEARCH_SERVICE_PUBLISHED_PORT:-127.0.0.1:18090}:${SEARCH_SERVICE_PORT:-8090}"
    depends_on:
      connector-controller:
        condition: service_started

volumes:
  # Benannte Volumes schuetzen State/Caches vor Container-Recreates.
  connector-postgres-data:
  connector-redis-data:
  connector-cache:

networks:
  connector-net:
    # false erzeugt ein eigenes Netz. true hängt alle Services an ein bereits
    # vorhandenes Docker-Netz, dessen Name per CONNECTOR_DOCKER_NETWORK_NAME
    # gesetzt wird.
    name: ${CONNECTOR_DOCKER_NETWORK_NAME:-seafile-ragflow-connector-net}
    external: ${CONNECTOR_DOCKER_NETWORK_EXTERNAL:-false}
