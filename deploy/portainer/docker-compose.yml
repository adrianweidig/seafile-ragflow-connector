# Portainer-/Compose-Stack für den Seafile-RAGFlow-Connector.
#
# Aufbau:
# - x-connector-env sammelt alle Runtime-Werte, damit Controller, Worker und
#   Reconciler exakt dieselbe Konfiguration sehen.
# - x-connector-common sammelt Image, Volumes, Netzwerk und Healthcheck.
# - services enthält nur noch die konkreten Rollen und die State-Dienste.
#
# Nutzer müssen normalerweise nur die Werte in stack.env/connector.env setzen.
# OpenWebUI bleibt optional: Fehlen OpenWebUI-Werte, läuft der Stack weiterhin
# als Seafile -> RAGFlow Connector.

name: ${COMPOSE_PROJECT_NAME:-seafile-ragflow-connector}

x-connector-env: &connector-env
  # -------------------------------------------------------------------
  # Runtime und Logging
  # -------------------------------------------------------------------
  TZ: ${TZ:-Europe/Berlin}
  APP_ENV: ${APP_ENV:-production}
  CONNECTOR_LANGUAGE: ${CONNECTOR_LANGUAGE:-}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  LOG_FORMAT: ${LOG_FORMAT:-json}
  DRY_RUN: ${DRY_RUN:-false}

  # -------------------------------------------------------------------
  # TLS-Vertrauen für interne oder private Zertifizierungsstellen
  # -------------------------------------------------------------------
  CONNECTOR_CA_BUNDLE: ${CONNECTOR_CA_BUNDLE:-}
  CONNECTOR_SYSTEM_CA_BUNDLE: ${CONNECTOR_SYSTEM_CA_BUNDLE:-/etc/ssl/certs/ca-certificates.crt}
  SSL_CERT_FILE: ${SSL_CERT_FILE:-}
  REQUESTS_CA_BUNDLE: ${REQUESTS_CA_BUNDLE:-}

  # -------------------------------------------------------------------
  # Im Controller optional interaktives Dashboard und geschützter OpenWebUI-Proxy
  # -------------------------------------------------------------------
  CONNECTOR_DASHBOARD_ENABLED: ${CONNECTOR_DASHBOARD_ENABLED:-false}
  CONNECTOR_DASHBOARD_CONTROL_ENABLED: ${CONNECTOR_DASHBOARD_CONTROL_ENABLED:-false}
  CONNECTOR_AUTOMATION_INITIAL_STATE: ${CONNECTOR_AUTOMATION_INITIAL_STATE:-running}
  CONNECTOR_DASHBOARD_HOST: ${CONNECTOR_DASHBOARD_HOST:-0.0.0.0}
  CONNECTOR_DASHBOARD_PORT: ${CONNECTOR_DASHBOARD_PORT:-8080}
  CONNECTOR_DASHBOARD_MAX_LOG_ENTRIES: ${CONNECTOR_DASHBOARD_MAX_LOG_ENTRIES:-5000}
  CONNECTOR_DASHBOARD_MAX_EVENT_ENTRIES: ${CONNECTOR_DASHBOARD_MAX_EVENT_ENTRIES:-10000}
  CONNECTOR_DASHBOARD_MAX_SYNC_RUNS: ${CONNECTOR_DASHBOARD_MAX_SYNC_RUNS:-1000}
  CONNECTOR_DASHBOARD_LOG_PAGE_SIZE: ${CONNECTOR_DASHBOARD_LOG_PAGE_SIZE:-100}
  CONNECTOR_DASHBOARD_MAX_FIELD_LENGTH: ${CONNECTOR_DASHBOARD_MAX_FIELD_LENGTH:-4000}
  CONNECTOR_DASHBOARD_AUTH_USERNAME: ${CONNECTOR_DASHBOARD_AUTH_USERNAME:-}
  CONNECTOR_DASHBOARD_AUTH_PASSWORD: ${CONNECTOR_DASHBOARD_AUTH_PASSWORD:-}

  # -------------------------------------------------------------------
  # Interne Autorisierungs-API und ACL-Snapshot
  # -------------------------------------------------------------------
  AUTHZ_API_ENABLED: ${AUTHZ_API_ENABLED:-true}
  AUTHZ_API_SHARED_SECRET: ${AUTHZ_API_SHARED_SECRET:?set AUTHZ_API_SHARED_SECRET}
  AUTHZ_API_ALLOW_NETWORKS: ${AUTHZ_API_ALLOW_NETWORKS:-}
  AUTHZ_API_FAIL_CLOSED: ${AUTHZ_API_FAIL_CLOSED:-true}
  AUTHZ_API_MAX_ACL_AGE_SECONDS: ${AUTHZ_API_MAX_ACL_AGE_SECONDS:-7200}
  SEARCH_ACL_SYNC_ENABLED: ${SEARCH_ACL_SYNC_ENABLED:-true}
  SEARCH_ACL_SYNC_INTERVAL_SECONDS: ${SEARCH_ACL_SYNC_INTERVAL_SECONDS:-1800}
  SEARCH_ACL_INCLUDE_SUBFOLDER_PERMISSIONS: ${SEARCH_ACL_INCLUDE_SUBFOLDER_PERMISSIONS:-false}
  SEARCH_ACL_INCLUDE_SHARE_LINKS: ${SEARCH_ACL_INCLUDE_SHARE_LINKS:-false}

  # -------------------------------------------------------------------
  # Quelle: bestehender Seafile-Server
  # -------------------------------------------------------------------
  # Muss aus dem Connector-Container erreichbar sein. Der Connector versucht
  # zur Laufzeit zuerst HTTPS auf derselben Host/Port-Kombination und fällt
  # nur bei technischem HTTPS-Fehler auf HTTP zurück.
  SEAFILE_BASE_URL: ${SEAFILE_BASE_URL:?set SEAFILE_BASE_URL}
  SEAFILE_INTERNAL_URL: ${SEAFILE_INTERNAL_URL:-}
  SEAFILE_ADMIN_TOKEN: ${SEAFILE_ADMIN_TOKEN:?set SEAFILE_ADMIN_TOKEN}
  SEAFILE_SYNC_USER_TOKEN: ${SEAFILE_SYNC_USER_TOKEN:?set SEAFILE_SYNC_USER_TOKEN}
  SEAFILE_SYNC_USER_EMAIL: ${SEAFILE_SYNC_USER_EMAIL:-}
  SEAFILE_SYNC_USER_AUTO_SHARE_ENABLED: ${SEAFILE_SYNC_USER_AUTO_SHARE_ENABLED:-false}
  SEAFILE_SKIP_ENCRYPTED_LIBRARIES: ${SEAFILE_SKIP_ENCRYPTED_LIBRARIES:-true}
  SEAFILE_SKIP_VIRTUAL_REPOS: ${SEAFILE_SKIP_VIRTUAL_REPOS:-true}
  SEAFILE_VERIFY_SSL: ${SEAFILE_VERIFY_SSL:-true}
  SEAFILE_CA_BUNDLE: ${SEAFILE_CA_BUNDLE:-}
  SEAFILE_CLIENT_CERT_FILE: ${SEAFILE_CLIENT_CERT_FILE:-}
  SEAFILE_CLIENT_KEY_FILE: ${SEAFILE_CLIENT_KEY_FILE:-}
  SEAFILE_REWRITE_DOWNLOAD_URLS: ${SEAFILE_REWRITE_DOWNLOAD_URLS:-false}
  SEAFILE_DOWNLOAD_REWRITE_FROM: ${SEAFILE_DOWNLOAD_REWRITE_FROM:-}
  SEAFILE_DOWNLOAD_REWRITE_TO: ${SEAFILE_DOWNLOAD_REWRITE_TO:-}
  SEAFILE_DOWNLOAD_ALLOWED_ORIGINS: ${SEAFILE_DOWNLOAD_ALLOWED_ORIGINS:-}
  SEAFILE_PUBLIC_BASE_URL: ${SEAFILE_PUBLIC_BASE_URL:-}
  SEAFILE_FILE_URL_TEMPLATE: ${SEAFILE_FILE_URL_TEMPLATE:-}

  # -------------------------------------------------------------------
  # Ziel: bestehender RAGFlow-Server
  # -------------------------------------------------------------------
  # Muss aus dem Connector-Container erreichbar sein. Auch hier prüft der
  # Connector zuerst HTTPS und dokumentiert den effektiven Transport im
  # Dashboard.
  RAGFLOW_BASE_URL: ${RAGFLOW_BASE_URL:?set RAGFLOW_BASE_URL}
  RAGFLOW_INTERNAL_URL: ${RAGFLOW_INTERNAL_URL:-}
  RAGFLOW_API_KEY: ${RAGFLOW_API_KEY:?set RAGFLOW_API_KEY}
  RAGFLOW_INTERACTIVE_API_KEY: ${RAGFLOW_INTERACTIVE_API_KEY:-}
  RAGFLOW_INTERACTIVE_OWNER_ID: ${RAGFLOW_INTERACTIVE_OWNER_ID:-}
  RAGFLOW_INTERACTIVE_CHAT_MODEL_ID: ${RAGFLOW_INTERACTIVE_CHAT_MODEL_ID:-}
  RAGFLOW_TEMPLATE_DATASET_NAME: ${RAGFLOW_TEMPLATE_DATASET_NAME:-connector_template}
  RAGFLOW_GENERATED_DATASET_PERMISSION: ${RAGFLOW_GENERATED_DATASET_PERMISSION:-me}
  RAGFLOW_TEMPLATE_AUTO_CREATE: ${RAGFLOW_TEMPLATE_AUTO_CREATE:-true}
  RAGFLOW_TEMPLATE_REQUIRED: ${RAGFLOW_TEMPLATE_REQUIRED:-true}
  RAGFLOW_TEMPLATE_CHAT_NAME: ${RAGFLOW_TEMPLATE_CHAT_NAME:-connector_template_chat}
  RAGFLOW_SEARCH_TEMPLATE_ENABLED: ${RAGFLOW_SEARCH_TEMPLATE_ENABLED:-true}
  RAGFLOW_SEARCH_TEMPLATE_NAME: ${RAGFLOW_SEARCH_TEMPLATE_NAME:-search_template}
  RAGFLOW_SEARCH_TEMPLATE_AUTO_CREATE: ${RAGFLOW_SEARCH_TEMPLATE_AUTO_CREATE:-true}
  RAGFLOW_SEARCH_TEMPLATE_REQUIRED: ${RAGFLOW_SEARCH_TEMPLATE_REQUIRED:-false}
  RAGFLOW_SEARCH_TEMPLATE_REFRESH_SECONDS: ${RAGFLOW_SEARCH_TEMPLATE_REFRESH_SECONDS:-300}
  SEARCH_ANSWER_GENERATION_MODE: ${SEARCH_ANSWER_GENERATION_MODE:-ragflow_chat}
  RAGFLOW_SEARCH_ANSWER_CHAT_NAME: ${RAGFLOW_SEARCH_ANSWER_CHAT_NAME:-connector_search_answer}
  RAGFLOW_SEARCH_ANSWER_CHAT_AUTO_CREATE: ${RAGFLOW_SEARCH_ANSWER_CHAT_AUTO_CREATE:-true}
  SEARCH_ANSWER_LLM_BASE_URL: ${SEARCH_ANSWER_LLM_BASE_URL:-}
  SEARCH_ANSWER_LLM_MODEL: ${SEARCH_ANSWER_LLM_MODEL:-}
  SEARCH_ANSWER_LLM_API_KEY: ${SEARCH_ANSWER_LLM_API_KEY:-}
  SEARCH_ANSWER_LLM_TIMEOUT_SECONDS: ${SEARCH_ANSWER_LLM_TIMEOUT_SECONDS:-60}
  SEARCH_ANSWER_LLM_MAX_TOKENS: ${SEARCH_ANSWER_LLM_MAX_TOKENS:-900}
  SEARCH_ANSWER_LLM_TEMPERATURE: ${SEARCH_ANSWER_LLM_TEMPERATURE:-0.2}
  SEARCH_RAGFLOW_TEMPLATE_SOURCE_ORDER: ${SEARCH_RAGFLOW_TEMPLATE_SOURCE_ORDER:-search_app,chat,builtin}
  SEARCH_RAGFLOW_CANDIDATE_TOP_K: ${SEARCH_RAGFLOW_CANDIDATE_TOP_K:-}
  SEARCH_RAGFLOW_TOP_N: ${SEARCH_RAGFLOW_TOP_N:-}
  SEARCH_RAGFLOW_SIMILARITY_THRESHOLD: ${SEARCH_RAGFLOW_SIMILARITY_THRESHOLD:-}
  SEARCH_RAGFLOW_VECTOR_SIMILARITY_WEIGHT: ${SEARCH_RAGFLOW_VECTOR_SIMILARITY_WEIGHT:-}
  SEARCH_RAGFLOW_RERANK_ID: ${SEARCH_RAGFLOW_RERANK_ID:-}
  SEARCH_RAGFLOW_KEYWORD: ${SEARCH_RAGFLOW_KEYWORD:-}
  SEARCH_RAGFLOW_HIGHLIGHT: ${SEARCH_RAGFLOW_HIGHLIGHT:-}
  SEARCH_RAGFLOW_CROSS_LANGUAGES: ${SEARCH_RAGFLOW_CROSS_LANGUAGES:-}
  SEARCH_RAGFLOW_USE_KG: ${SEARCH_RAGFLOW_USE_KG:-}
  SEARCH_RAGFLOW_TOC_ENHANCE: ${SEARCH_RAGFLOW_TOC_ENHANCE:-}
  SEARCH_DOCUMENT_VIEWER_ENABLED: ${SEARCH_DOCUMENT_VIEWER_ENABLED:-true}
  SEARCH_DOCUMENT_VIEWER_MAX_MB: ${SEARCH_DOCUMENT_VIEWER_MAX_MB:-100}
  SEARCH_DOCUMENT_VIEWER_TIMEOUT_SECONDS: ${SEARCH_DOCUMENT_VIEWER_TIMEOUT_SECONDS:-30}
  SEARCH_DOCUMENT_VIEWER_MAX_CONCURRENCY: ${SEARCH_DOCUMENT_VIEWER_MAX_CONCURRENCY:-4}
  SEARCH_PDF_RENDER_MAX_CONCURRENCY: ${SEARCH_PDF_RENDER_MAX_CONCURRENCY:-2}
  SEARCH_PDF_RENDER_MAX_MB: ${SEARCH_PDF_RENDER_MAX_MB:-25}
  RAGFLOW_VERIFY_SSL: ${RAGFLOW_VERIFY_SSL:-true}
  RAGFLOW_CA_BUNDLE: ${RAGFLOW_CA_BUNDLE:-}
  RAGFLOW_CLIENT_CERT_FILE: ${RAGFLOW_CLIENT_CERT_FILE:-}
  RAGFLOW_CLIENT_KEY_FILE: ${RAGFLOW_CLIENT_KEY_FILE:-}
  RAGFLOW_TEMPLATE_REFRESH_SECONDS: ${RAGFLOW_TEMPLATE_REFRESH_SECONDS:-1800}
  RAGFLOW_REFRESH_DATASET_SETTINGS: ${RAGFLOW_REFRESH_DATASET_SETTINGS:-true}
  RAGFLOW_VALIDATE_CREATED_DATASET: ${RAGFLOW_VALIDATE_CREATED_DATASET:-true}
  RAGFLOW_PUBLIC_BASE_URL: ${RAGFLOW_PUBLIC_BASE_URL:-}
  RAGFLOW_DOCUMENT_URL_TEMPLATE: ${RAGFLOW_DOCUMENT_URL_TEMPLATE:-}

  # -------------------------------------------------------------------
  # Optionales Ziel: OpenWebUI
  # -------------------------------------------------------------------
  # Default bleibt aus. Dadurch funktioniert derselbe Stack auch, wenn keine
  # OpenWebUI-Instanz vorhanden ist. Für echte Synchronisation setzen:
  # OPENWEBUI_INTEGRATION_ENABLED=true, OPENWEBUI_SYNC_MODE=sync oder repair,
  # OPENWEBUI_ADMIN_API_KEY und OPENWEBUI_PROXY_SHARED_SECRET.
  OPENWEBUI_INTEGRATION_ENABLED: ${OPENWEBUI_INTEGRATION_ENABLED:-false}
  OPENWEBUI_BASE_URL: ${OPENWEBUI_BASE_URL:-http://localhost:3000}
  OPENWEBUI_ADMIN_API_KEY: ${OPENWEBUI_ADMIN_API_KEY:-}
  OPENWEBUI_SYNC_ON_STARTUP: ${OPENWEBUI_SYNC_ON_STARTUP:-true}
  OPENWEBUI_SYNC_MODE: ${OPENWEBUI_SYNC_MODE:-disabled}
  OPENWEBUI_CREATE_TOOLS: ${OPENWEBUI_CREATE_TOOLS:-true}
  OPENWEBUI_CREATE_PIPES: ${OPENWEBUI_CREATE_PIPES:-true}
  OPENWEBUI_REQUEST_TIMEOUT_SECONDS: ${OPENWEBUI_REQUEST_TIMEOUT_SECONDS:-180}
  OPENWEBUI_VERIFY_SSL: ${OPENWEBUI_VERIFY_SSL:-true}
  OPENWEBUI_CA_BUNDLE: ${OPENWEBUI_CA_BUNDLE:-}
  OPENWEBUI_FUNCTION_NAMESPACE: ${OPENWEBUI_FUNCTION_NAMESPACE:-ragflow}
  OPENWEBUI_SOURCE_PREVIEW_MODE: ${OPENWEBUI_SOURCE_PREVIEW_MODE:-ragflow_link}
  OPENWEBUI_PROXY_PUBLIC_BASE_URL: ${OPENWEBUI_PROXY_PUBLIC_BASE_URL:-}
  OPENWEBUI_PROXY_INTERNAL_BASE_URL: ${OPENWEBUI_PROXY_INTERNAL_BASE_URL:-}
  OPENWEBUI_PROXY_SHARED_SECRET: ${OPENWEBUI_PROXY_SHARED_SECRET:-}
  OPENWEBUI_AUTHZ_ENABLED: ${OPENWEBUI_AUTHZ_ENABLED:-true}
  OPENWEBUI_AUTHZ_BASE_URL: ${OPENWEBUI_AUTHZ_BASE_URL:-http://connector-controller:8080}
  OPENWEBUI_AUTHZ_SHARED_SECRET: ${OPENWEBUI_AUTHZ_SHARED_SECRET:-${AUTHZ_API_SHARED_SECRET:-}}
  OPENWEBUI_AUTHZ_FAIL_CLOSED: ${OPENWEBUI_AUTHZ_FAIL_CLOSED:-true}
  OPENWEBUI_PROXY_VERIFY_SSL: ${OPENWEBUI_PROXY_VERIFY_SSL:-${CONNECTOR_PROXY_VERIFY_SSL:-true}}
  OPENWEBUI_PROXY_CA_BUNDLE: ${OPENWEBUI_PROXY_CA_BUNDLE:-${CONNECTOR_PROXY_CA_BUNDLE:-}}
  CONNECTOR_PROXY_VERIFY_SSL: ${CONNECTOR_PROXY_VERIFY_SSL:-}
  CONNECTOR_PROXY_CA_BUNDLE: ${CONNECTOR_PROXY_CA_BUNDLE:-}
  CONNECTOR_PROXY_CLIENT_CERT_FILE: ${CONNECTOR_PROXY_CLIENT_CERT_FILE:-}
  CONNECTOR_PROXY_CLIENT_KEY_FILE: ${CONNECTOR_PROXY_CLIENT_KEY_FILE:-}
  OPENWEBUI_PIPE_ANSWER_SYNTHESIS_ENABLED: ${OPENWEBUI_PIPE_ANSWER_SYNTHESIS_ENABLED:-false}
  OPENWEBUI_PIPE_ANSWER_LLM_BASE_URL: ${OPENWEBUI_PIPE_ANSWER_LLM_BASE_URL:-}
  OPENWEBUI_PIPE_ANSWER_LLM_MODEL: ${OPENWEBUI_PIPE_ANSWER_LLM_MODEL:-}
  OPENWEBUI_PIPE_ANSWER_LLM_API_KEY: ${OPENWEBUI_PIPE_ANSWER_LLM_API_KEY:-}
  OPENWEBUI_SYNC_INTERVAL_SECONDS: ${OPENWEBUI_SYNC_INTERVAL_SECONDS:-1800}
  OPENWEBUI_DATASET_ALLOWLIST: ${OPENWEBUI_DATASET_ALLOWLIST:-}

  # -------------------------------------------------------------------
  # Connector-State: Datenbank und Queue innerhalb dieses Stacks
  # -------------------------------------------------------------------
  # Diese statische Datei ist das bundled-state-Profil. Für external-state den
  # Enterprise-Wizard verwenden; er entfernt die lokalen State-Dienste.
  POSTGRES_HOST: connector-postgres
  POSTGRES_PORT: 5432
  POSTGRES_DB: ${POSTGRES_DB:-seafile_ragflow_sync}
  POSTGRES_USER: ${POSTGRES_USER:-sync}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
  DATABASE_URL: ${DATABASE_URL:-}
  REDIS_HOST: connector-redis
  REDIS_PORT: 6379
  REDIS_DB: ${REDIS_DB:-0}
  REDIS_URL: ${REDIS_URL:-}

  # -------------------------------------------------------------------
  # Datei-Policy
  # -------------------------------------------------------------------
  ALLOW_UNKNOWN_TEXT_FILES: ${ALLOW_UNKNOWN_TEXT_FILES:-true}
  ALLOW_EXTENSIONS: ${ALLOW_EXTENSIONS:-}
  DENY_EXTENSIONS: ${DENY_EXTENSIONS:-.exe,.dll,.so,.zip,.tar,.gz,.7z,.tmp,.part}
  TEXT_EXTENSIONS: ${TEXT_EXTENSIONS:-.ada,.adb,.ads,.txt,.md,.rst,.py,.js,.ts,.java,.c,.cpp,.h,.sql,.xml,.json,.yaml,.yml,.ini,.cfg,.log}
  BINARY_DIRECT_EXTENSIONS: ${BINARY_DIRECT_EXTENSIONS:-.pdf,.docx,.xlsx,.pptx,.png,.jpg,.jpeg}
  DEFAULT_TEXT_INGESTION_STRATEGY: ${DEFAULT_TEXT_INGESTION_STRATEGY:-text_projection}
  PRESERVE_ORIGINAL_FILENAME_IN_METADATA: ${PRESERVE_ORIGINAL_FILENAME_IN_METADATA:-true}
  MAX_FILE_SIZE_MB: ${MAX_FILE_SIZE_MB:-1024}
  EXCLUDE_REGEX: ${EXCLUDE_REGEX:-}

  # -------------------------------------------------------------------
  # RAGFlow-Dataset-Einstellungen
  # -------------------------------------------------------------------
  DATASET_SETTINGS_SOURCE: ${DATASET_SETTINGS_SOURCE:-ragflow_current}
  REPARSE_ON_DATASET_SETTINGS_CHANGE: ${REPARSE_ON_DATASET_SETTINGS_CHANGE:-false}

  # -------------------------------------------------------------------
  # Scheduling
  # -------------------------------------------------------------------
  DISCOVERY_INTERVAL_SECONDS: ${DISCOVERY_INTERVAL_SECONDS:-1800}
  DELTA_SYNC_INTERVAL_SECONDS: ${DELTA_SYNC_INTERVAL_SECONDS:-1800}
  RECONCILE_INTERVAL_SECONDS: ${RECONCILE_INTERVAL_SECONDS:-1800}
  FULL_SYNC_ON_MISSING_COMMIT: ${FULL_SYNC_ON_MISSING_COMMIT:-true}

  # -------------------------------------------------------------------
  # Delete-/Repair-Policy
  # -------------------------------------------------------------------
  DELETE_RAGFLOW_DOCS_ON_SEAFILE_DELETE: ${DELETE_RAGFLOW_DOCS_ON_SEAFILE_DELETE:-true}
  DELETE_DATASET_WHEN_LIBRARY_DELETED: ${DELETE_DATASET_WHEN_LIBRARY_DELETED:-true}
  ARCHIVE_DATASET_WHEN_LIBRARY_DELETED: ${ARCHIVE_DATASET_WHEN_LIBRARY_DELETED:-false}

  # -------------------------------------------------------------------
  # Durchsatz und Backpressure
  # -------------------------------------------------------------------
  MAX_CONCURRENT_LIBRARIES: ${MAX_CONCURRENT_LIBRARIES:-2}
  UPLOAD_WORKERS: ${UPLOAD_WORKERS:-2}
  PARSE_WORKERS: ${PARSE_WORKERS:-1}
  RAGFLOW_UPLOAD_BATCH_SIZE: ${RAGFLOW_UPLOAD_BATCH_SIZE:-8}
  RAGFLOW_PARSE_BATCH_SIZE: ${RAGFLOW_PARSE_BATCH_SIZE:-16}
  RAGFLOW_MAX_INFLIGHT_DOCUMENTS: ${RAGFLOW_MAX_INFLIGHT_DOCUMENTS:-64}

  # -------------------------------------------------------------------
  # Retry-Policy
  # -------------------------------------------------------------------
  JOB_MAX_ATTEMPTS: ${JOB_MAX_ATTEMPTS:-5}
  JOB_RETRY_BASE_SECONDS: ${JOB_RETRY_BASE_SECONDS:-30}
  JOB_RETRY_MAX_SECONDS: ${JOB_RETRY_MAX_SECONDS:-3600}
  JOB_LEASE_SECONDS: ${JOB_LEASE_SECONDS:-900}
  JOB_HEARTBEAT_SECONDS: ${JOB_HEARTBEAT_SECONDS:-60}
  JOB_HISTORY_RETENTION_DAYS: ${JOB_HISTORY_RETENTION_DAYS:-30}

  # -------------------------------------------------------------------
  # Lokale Runtime-Pfade und Offline-Verhalten
  # -------------------------------------------------------------------
  CACHE_DIR: ${CACHE_DIR:-/cache}
  TEMP_DIR: ${TEMP_DIR:-/cache/tmp}
  ALLOW_OUTBOUND_INTERNET: ${ALLOW_OUTBOUND_INTERNET:-false}
  DISABLE_TELEMETRY: ${DISABLE_TELEMETRY:-true}

  # -------------------------------------------------------------------
  # Startup / Bootstrap
  # -------------------------------------------------------------------
  CONNECTOR_AUTO_INIT_DB: ${CONNECTOR_AUTO_INIT_DB:-true}
  CONNECTOR_STARTUP_CHECK: ${CONNECTOR_STARTUP_CHECK:-infra}
  CONNECTOR_STARTUP_MAX_WAIT_SECONDS: ${CONNECTOR_STARTUP_MAX_WAIT_SECONDS:-300}
  CONNECTOR_STARTUP_SLEEP_SECONDS: ${CONNECTOR_STARTUP_SLEEP_SECONDS:-5}
  CONNECTOR_BOOTSTRAP_CHECK_LIVE: ${CONNECTOR_BOOTSTRAP_CHECK_LIVE:-false}
  CONNECTOR_FALLBACK_CACHE_DIR: ${CONNECTOR_FALLBACK_CACHE_DIR:-/tmp/seafile-ragflow-connector/cache}
  CONNECTOR_FALLBACK_TEMP_DIR: ${CONNECTOR_FALLBACK_TEMP_DIR:-/tmp/seafile-ragflow-connector/cache/tmp}

# Gemeinsamer Container-Block für alle Connector-Rollen.
x-connector-common: &connector-common
  image: ${CONNECTOR_IMAGE:-ghcr.io/adrianweidig/seafile-ragflow-connector:latest}
  pull_policy: ${CONNECTOR_IMAGE_PULL_POLICY:-missing}
  restart: unless-stopped
  environment: *connector-env
  extra_hosts:
    - "host.docker.internal:host-gateway"
  volumes:
    - connector-cache:/cache
    - type: bind
      source: ${CONNECTOR_CERTS_HOST_DIR:-./certs}
      target: /certs
      read_only: true
  networks:
    - connector-net
  healthcheck:
    test: ["CMD", "connector", "check-config"]
    interval: 30s
    timeout: 10s
    retries: 5
    start_period: 30s

# Separater Search-Container ohne Seafile-Admin- oder Sync-Token.
x-search-env: &search-env
  TZ: ${TZ:-Europe/Berlin}
  APP_ENV: ${APP_ENV:-production}
  CONNECTOR_LANGUAGE: ${CONNECTOR_LANGUAGE:-}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  LOG_FORMAT: ${LOG_FORMAT:-json}
  CONNECTOR_CA_BUNDLE: ${CONNECTOR_CA_BUNDLE:-}
  CONNECTOR_SYSTEM_CA_BUNDLE: ${CONNECTOR_SYSTEM_CA_BUNDLE:-/etc/ssl/certs/ca-certificates.crt}
  SSL_CERT_FILE: ${SSL_CERT_FILE:-}
  REQUESTS_CA_BUNDLE: ${REQUESTS_CA_BUNDLE:-}
  POSTGRES_HOST: connector-postgres
  POSTGRES_PORT: 5432
  POSTGRES_DB: ${POSTGRES_DB:-seafile_ragflow_sync}
  POSTGRES_USER: ${POSTGRES_USER:-sync}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
  DATABASE_URL: ${DATABASE_URL:-}
  # Das statische Portainer-Standardprofil enthält Search. Für Core-only den
  # Wizard mit ENTERPRISE_WITH_SEARCH=false verwenden.
  SEARCH_SERVICE_ENABLED: "true"
  SEARCH_SERVICE_HOST: ${SEARCH_SERVICE_HOST:-0.0.0.0}
  SEARCH_SERVICE_PORT: ${SEARCH_SERVICE_PORT:-8090}
  SEARCH_AUTH_MODE: ${SEARCH_AUTH_MODE:-trusted_header}
  SEARCH_TRUSTED_USERNAME_HEADER: ${SEARCH_TRUSTED_USERNAME_HEADER:-X-Forwarded-User}
  SEARCH_TRUSTED_EMAIL_HEADER: ${SEARCH_TRUSTED_EMAIL_HEADER:-X-Forwarded-Email}
  SEARCH_TRUSTED_DISPLAY_NAME_HEADER: ${SEARCH_TRUSTED_DISPLAY_NAME_HEADER:-X-Forwarded-Name}
  SEARCH_TRUSTED_PROXY_CIDRS: ${SEARCH_TRUSTED_PROXY_CIDRS:-}
  SEARCH_OPENWEBUI_LDAP_BASE_URL: ${SEARCH_OPENWEBUI_LDAP_BASE_URL:-http://openwebui:8080}
  SEARCH_OPENWEBUI_LDAP_VERIFY_SSL: ${SEARCH_OPENWEBUI_LDAP_VERIFY_SSL:-true}
  SEARCH_OPENWEBUI_LDAP_CA_BUNDLE: ${SEARCH_OPENWEBUI_LDAP_CA_BUNDLE:-}
  SEARCH_OPENWEBUI_LDAP_TIMEOUT_SECONDS: ${SEARCH_OPENWEBUI_LDAP_TIMEOUT_SECONDS:-20}
  SEARCH_SESSION_SECRET: ${SEARCH_SESSION_SECRET:-change-me}
  SEARCH_SESSION_TTL_SECONDS: ${SEARCH_SESSION_TTL_SECONDS:-28800}
  SEARCH_SESSION_COOKIE_NAME: ${SEARCH_SESSION_COOKIE_NAME:-connector_search_session}
  SEARCH_SESSION_COOKIE_SECURE: ${SEARCH_SESSION_COOKIE_SECURE:-true}
  SEARCH_AUTHZ_BASE_URL: ${SEARCH_AUTHZ_BASE_URL:-http://connector-controller:8080}
  SEARCH_AUTHZ_SHARED_SECRET: ${SEARCH_AUTHZ_SHARED_SECRET:?set SEARCH_AUTHZ_SHARED_SECRET}
  SEARCH_RAGFLOW_BASE_URL: ${SEARCH_RAGFLOW_BASE_URL:?set SEARCH_RAGFLOW_BASE_URL}
  SEARCH_RAGFLOW_API_KEY: ${SEARCH_RAGFLOW_API_KEY:?set SEARCH_RAGFLOW_API_KEY}
  SEARCH_RAGFLOW_VERIFY_SSL: ${SEARCH_RAGFLOW_VERIFY_SSL:-true}
  SEARCH_RAGFLOW_CA_BUNDLE: ${SEARCH_RAGFLOW_CA_BUNDLE:-}
  RAGFLOW_SEARCH_TEMPLATE_ENABLED: ${RAGFLOW_SEARCH_TEMPLATE_ENABLED:-true}
  RAGFLOW_SEARCH_TEMPLATE_NAME: ${RAGFLOW_SEARCH_TEMPLATE_NAME:-search_template}
  SEARCH_ANSWER_GENERATION_MODE: ${SEARCH_ANSWER_GENERATION_MODE:-ragflow_chat}
