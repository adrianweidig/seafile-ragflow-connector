map $http_upgrade $connection_upgrade {
    default upgrade;
    "" close;
}

server {
    listen 80;
    server_name connector.top.secret;

    location = /top-secret-root-ca.crl {
        default_type application/pkix-crl;
        alias /etc/nginx/certs/top-secret-root-ca.crl;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name connector.top.secret;

    ssl_certificate /etc/nginx/certs/connector.top.secret.cert.pem;
    ssl_certificate_key /etc/nginx/certs/connector.top.secret.key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:connector_top_secret_tls:10m;
    ssl_session_timeout 1h;

    client_max_body_size 0;

    location / {
        proxy_pass http://connector-controller:8080;
        proxy_http_version 1.1;
        proxy_read_timeout 3600s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 3600s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}
