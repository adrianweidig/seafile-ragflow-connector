# TLS/CA overlay for the Connector controller, worker and reconciler.
#
# Use with one of the normal stack files, for example:
#   docker compose --env-file connector.env \
#     -f deploy/compose/openwebui.compose.yml \
#     -f deploy/compose/bundled-state.compose.yml \
#     -f deploy/compose/docker-compose.tls-example.yml config
#
# The file mounted at CONNECTOR_TLS_CA_HOST_FILE must contain the internal
# Root CA plus any required Intermediate CAs in PEM format. Do not mount a
# private key here.

services:
  connector-controller:
    environment:
      SSL_CERT_FILE: ${SSL_CERT_FILE:-/certs/internal-ca.pem}
      REQUESTS_CA_BUNDLE: ${REQUESTS_CA_BUNDLE:-/certs/internal-ca.pem}
      RAGFLOW_VERIFY_SSL: ${RAGFLOW_VERIFY_SSL:-true}
      RAGFLOW_CA_BUNDLE: ${RAGFLOW_CA_BUNDLE:-/certs/internal-ca.pem}
      SEAFILE_VERIFY_SSL: ${SEAFILE_VERIFY_SSL:-true}
      SEAFILE_CA_BUNDLE: ${SEAFILE_CA_BUNDLE:-/certs/internal-ca.pem}
      OPENWEBUI_VERIFY_SSL: ${OPENWEBUI_VERIFY_SSL:-true}
      OPENWEBUI_CA_BUNDLE: ${OPENWEBUI_CA_BUNDLE:-/certs/internal-ca.pem}
      OPENWEBUI_PROXY_VERIFY_SSL: ${OPENWEBUI_PROXY_VERIFY_SSL:-true}
      OPENWEBUI_PROXY_CA_BUNDLE: ${OPENWEBUI_PROXY_CA_BUNDLE:-/certs/internal-ca.pem}
    volumes:
      - ${CONNECTOR_TLS_CA_HOST_FILE:-./deploy/certs/internal-ca.pem}:/certs/internal-ca.pem:ro

  connector-worker:
    environment:
      SSL_CERT_FILE: ${SSL_CERT_FILE:-/certs/internal-ca.pem}
      REQUESTS_CA_BUNDLE: ${REQUESTS_CA_BUNDLE:-/certs/internal-ca.pem}
      RAGFLOW_VERIFY_SSL: ${RAGFLOW_VERIFY_SSL:-true}
      RAGFLOW_CA_BUNDLE: ${RAGFLOW_CA_BUNDLE:-/certs/internal-ca.pem}
      SEAFILE_VERIFY_SSL: ${SEAFILE_VERIFY_SSL:-true}
      SEAFILE_CA_BUNDLE: ${SEAFILE_CA_BUNDLE:-/certs/internal-ca.pem}
      OPENWEBUI_VERIFY_SSL: ${OPENWEBUI_VERIFY_SSL:-true}
      OPENWEBUI_CA_BUNDLE: ${OPENWEBUI_CA_BUNDLE:-/certs/internal-ca.pem}
    volumes:
      - ${CONNECTOR_TLS_CA_HOST_FILE:-./deploy/certs/internal-ca.pem}:/certs/internal-ca.pem:ro

  connector-reconciler:
    environment:
      SSL_CERT_FILE: ${SSL_CERT_FILE:-/certs/internal-ca.pem}
      REQUESTS_CA_BUNDLE: ${REQUESTS_CA_BUNDLE:-/certs/internal-ca.pem}
      RAGFLOW_VERIFY_SSL: ${RAGFLOW_VERIFY_SSL:-true}
      RAGFLOW_CA_BUNDLE: ${RAGFLOW_CA_BUNDLE:-/certs/internal-ca.pem}
      SEAFILE_VERIFY_SSL: ${SEAFILE_VERIFY_SSL:-true}
      SEAFILE_CA_BUNDLE: ${SEAFILE_CA_BUNDLE:-/certs/internal-ca.pem}
      OPENWEBUI_VERIFY_SSL: ${OPENWEBUI_VERIFY_SSL:-true}
      OPENWEBUI_CA_BUNDLE: ${OPENWEBUI_CA_BUNDLE:-/certs/internal-ca.pem}
    volumes:
      - ${CONNECTOR_TLS_CA_HOST_FILE:-./deploy/certs/internal-ca.pem}:/certs/internal-ca.pem:ro
