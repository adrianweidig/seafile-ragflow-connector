# Docker Compose: nutzernahe Wissenssuche als separater Container.
#
# Dieses Overlay ergänzt eine bestehende Connector-Compose-Variante um den
# Search-Service. Der Container bekommt bewusst keine Seafile-Admin- oder
# Sync-Tokens. Vor jeder RAGFlow-Abfrage ruft er die Authz-API im
# connector-controller auf.
#
# Startbeispiel:
#   docker compose --env-file connector.env \
#     -f deploy/compose/shared-network.compose.yml \
#     -f deploy/compose/search.compose.yml up -d

services:
  connector-search:
    image: ${CONNECTOR_IMAGE:-ghcr.io/adrianweidig/seafile-ragflow-connector:latest}
    pull_policy: ${CONNECTOR_IMAGE_PULL_POLICY:-missing}
    restart: unless-stopped
    command: ["search-server"]
    environment:
      TZ: ${TZ:-Europe/Berlin}
      APP_ENV: ${APP_ENV:-production}
      CONNECTOR_LANGUAGE: ${CONNECTOR_LANGUAGE:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      CONNECTOR_CA_BUNDLE: ${CONNECTOR_CA_BUNDLE:-}
      CONNECTOR_SYSTEM_CA_BUNDLE: ${CONNECTOR_SYSTEM_CA_BUNDLE:-/etc/ssl/certs/ca-certificates.crt}
      SSL_CERT_FILE: ${SSL_CERT_FILE:-}
      REQUESTS_CA_BUNDLE: ${REQUESTS_CA_BUNDLE:-}
      SEARCH_SERVICE_ENABLED: ${SEARCH_SERVICE_ENABLED:-true}
      SEARCH_SERVICE_HOST: ${SEARCH_SERVICE_HOST:-0.0.0.0}
      SEARCH_SERVICE_PORT: ${SEARCH_SERVICE_PORT:-8090}
      SEARCH_AUTH_MODE: ${SEARCH_AUTH_MODE:-trusted_header}
      SEARCH_TRUSTED_USERNAME_HEADER: ${SEARCH_TRUSTED_USERNAME_HEADER:-X-Forwarded-User}
      SEARCH_TRUSTED_EMAIL_HEADER: ${SEARCH_TRUSTED_EMAIL_HEADER:-X-Forwarded-Email}
      SEARCH_TRUSTED_DISPLAY_NAME_HEADER: ${SEARCH_TRUSTED_DISPLAY_NAME_HEADER:-X-Forwarded-Name}
      SEARCH_AUTHZ_BASE_URL: ${SEARCH_AUTHZ_BASE_URL:-http://connector-controller:8080}
      SEARCH_AUTHZ_SHARED_SECRET: ${SEARCH_AUTHZ_SHARED_SECRET:?set SEARCH_AUTHZ_SHARED_SECRET}
      SEARCH_RAGFLOW_BASE_URL: ${SEARCH_RAGFLOW_BASE_URL:?set SEARCH_RAGFLOW_BASE_URL}
      SEARCH_RAGFLOW_API_KEY: ${SEARCH_RAGFLOW_API_KEY:?set SEARCH_RAGFLOW_API_KEY}
      SEARCH_RAGFLOW_VERIFY_SSL: ${SEARCH_RAGFLOW_VERIFY_SSL:-true}
      SEARCH_RAGFLOW_CA_BUNDLE: ${SEARCH_RAGFLOW_CA_BUNDLE:-}
      RAGFLOW_SEARCH_TEMPLATE_ENABLED: ${RAGFLOW_SEARCH_TEMPLATE_ENABLED:-true}
      RAGFLOW_SEARCH_TEMPLATE_NAME: ${RAGFLOW_SEARCH_TEMPLATE_NAME:-search_template}
      SEARCH_RAGFLOW_TEMPLATE_SOURCE_ORDER: ${SEARCH_RAGFLOW_TEMPLATE_SOURCE_ORDER:-search_app,chat,builtin}
      SEARCH_RAGFLOW_CANDIDATE_TOP_K: ${SEARCH_RAGFLOW_CANDIDATE_TOP_K:-}
      SEARCH_RAGFLOW_TOP_N: ${SEARCH_RAGFLOW_TOP_N:-}
      SEARCH_RAGFLOW_SIMILARITY_THRESHOLD: ${SEARCH_RAGFLOW_SIMILARITY_THRESHOLD:-}
      SEARCH_RAGFLOW_VECTOR_SIMILARITY_WEIGHT: ${SEARCH_RAGFLOW_VECTOR_SIMILARITY_WEIGHT:-}
      SEARCH_RAGFLOW_RERANK_ID: ${SEARCH_RAGFLOW_RERANK_ID:-}
      SEARCH_RAGFLOW_KEYWORD: ${SEARCH_RAGFLOW_KEYWORD:-}
      SEARCH_RAGFLOW_HIGHLIGHT: ${SEARCH_RAGFLOW_HIGHLIGHT:-}
      SEARCH_RAGFLOW_CROSS_LANGUAGES: ${SEARCH_RAGFLOW_CROSS_LANGUAGES:-}
      SEARCH_RAGFLOW_USE_KG: ${SEARCH_RAGFLOW_USE_KG:-}
      SEARCH_RAGFLOW_TOC_ENHANCE: ${SEARCH_RAGFLOW_TOC_ENHANCE:-}
      SEARCH_SEAFILE_PUBLIC_BASE_URL: ${SEARCH_SEAFILE_PUBLIC_BASE_URL:-}
      SEARCH_SEAFILE_FILE_URL_TEMPLATE: ${SEARCH_SEAFILE_FILE_URL_TEMPLATE:-}
      SEARCH_DEFAULT_TOP_K: ${SEARCH_DEFAULT_TOP_K:-8}
      SEARCH_MAX_TOP_K: ${SEARCH_MAX_TOP_K:-20}
      SEARCH_MAX_SELECTED_PROFILES: ${SEARCH_MAX_SELECTED_PROFILES:-25}
      SEARCH_ENABLE_CHAT_MODE: ${SEARCH_ENABLE_CHAT_MODE:-true}
      SEARCH_ENABLE_RETRIEVAL_MODE: ${SEARCH_ENABLE_RETRIEVAL_MODE:-true}
      SEARCH_SOURCE_PREVIEW_ENABLED: ${SEARCH_SOURCE_PREVIEW_ENABLED:-true}
      SEARCH_SOURCE_HOVER_ENABLED: ${SEARCH_SOURCE_HOVER_ENABLED:-true}
      SEARCH_TEXT_FRAGMENT_LINKS_ENABLED: ${SEARCH_TEXT_FRAGMENT_LINKS_ENABLED:-true}
      SEARCH_RESULT_SNIPPET_CONTEXT_CHARS: ${SEARCH_RESULT_SNIPPET_CONTEXT_CHARS:-420}
      SEARCH_ANSWER_MAX_SOURCES: ${SEARCH_ANSWER_MAX_SOURCES:-8}
      SEARCH_SOURCE_PREVIEW_SECRET: ${SEARCH_SOURCE_PREVIEW_SECRET:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${SEARCH_SERVICE_PUBLISHED_PORT:-127.0.0.1:18090}:${SEARCH_SERVICE_PORT:-8090}"
    volumes:
      - type: bind
        source: ${CONNECTOR_CERTS_HOST_DIR:-./certs}
        target: /certs
        read_only: true
    networks:
      - connector-net
    depends_on:
      connector-controller:
        condition: service_started
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          python -c "import os, urllib.request;
          urllib.request.urlopen('http://127.0.0.1:%s/health' %
          os.getenv('SEARCH_SERVICE_PORT', '8090'), timeout=5).read()"
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

networks:
  connector-net:
    name: ${CONNECTOR_DOCKER_NETWORK_NAME:-seafile-ragflow-connector-net}
    external: ${CONNECTOR_DOCKER_NETWORK_EXTERNAL:-false}
