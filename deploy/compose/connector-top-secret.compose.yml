# Docker Compose Overlay: lokaler HTTPS-Edge für connector.top.secret.
#
# Dieses Overlay wird zusammen mit einer Basis-Compose-Datei aus diesem Ordner
# oder mit deploy/portainer/docker-compose.yml verwendet. Es aktiviert das
# lesende Dashboard im Controller und stellt davor einen Nginx-Reverse-Proxy
# mit lokalem TLS-Zertifikat.
#
# Beispiel:
#   docker compose --env-file connector.env \
#     -f deploy/compose/shared-network.compose.yml \
#     -f deploy/compose/connector-top-secret.compose.yml up -d

services:
  connector-controller:
    environment:
      CONNECTOR_DASHBOARD_ENABLED: ${CONNECTOR_DASHBOARD_ENABLED:-true}
      CONNECTOR_DASHBOARD_HOST: ${CONNECTOR_DASHBOARD_HOST:-0.0.0.0}
      CONNECTOR_DASHBOARD_PORT: ${CONNECTOR_DASHBOARD_PORT:-8080}
      CONNECTOR_DASHBOARD_AUTH_USERNAME: ${CONNECTOR_DASHBOARD_AUTH_USERNAME:-}
      CONNECTOR_DASHBOARD_AUTH_PASSWORD: ${CONNECTOR_DASHBOARD_AUTH_PASSWORD:-}

  connector-https-edge:
    image: ${CONNECTOR_HTTPS_EDGE_IMAGE:-nginx:1.27-alpine}
    pull_policy: ${CONNECTOR_HTTPS_EDGE_IMAGE_PULL_POLICY:-missing}
    restart: unless-stopped
    depends_on:
      connector-controller:
        condition: service_started
    ports:
      - "${CONNECTOR_HTTPS_HTTP_BIND:-127.0.0.1:80}:80"
      - "${CONNECTOR_HTTPS_HTTPS_BIND:-127.0.0.1:443}:443"
    volumes:
      - ./nginx/connector-top-secret.conf:/etc/nginx/conf.d/default.conf:ro
      - ${CONNECTOR_CERTS_HOST_DIR:-./certs}:/etc/nginx/certs:ro
    networks:
      connector-net:
        aliases:
          - connector.top.secret
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- --no-check-certificate https://127.0.0.1/api/health >/dev/null",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
