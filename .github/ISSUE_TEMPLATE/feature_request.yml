name: Feature-Vorschlag
description: Verbesserung oder Erweiterung vorschlagen
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem oder Bedarf
      description: Welches konkrete Betriebs-, Entwicklungs- oder Integrationsproblem soll gelöst werden?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Vorschlag
      description: Beschreibe die gewünschte Änderung möglichst konkret.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Bereich
      options:
        - Sync-Kern
        - Deployment oder Portainer
        - OpenWebUI
        - Dashboard
        - TLS oder Netzwerke
        - Tests oder CI
        - Dokumentation
        - Sonstiges
    validations:
      required: true
  - type: textarea
    id: constraints
    attributes:
      label: Randbedingungen
      description: Welche Kompatibilitäts-, Offline-, Security- oder Betriebsgrenzen sind wichtig?
  - type: checkboxes
    id: scope
    attributes:
      label: Scope-Bewusstsein
      options:
        - label: Der Vorschlag ändert Seafile nicht als Quelle der Wahrheit.
          required: true
        - label: Der Vorschlag benötigt keine Secrets im Repository.
          required: true
