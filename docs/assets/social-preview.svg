<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">Seafile RAGFlow Connector social preview</title>
  <desc id="desc">Social preview for a source-of-truth sync control plane that turns Seafile libraries into RAGFlow datasets and optional OpenWebUI custom models.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="0.48" stop-color="#f4faf6"/>
      <stop offset="1" stop-color="#fff7e8"/>
    </linearGradient>
    <linearGradient id="control" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0f7b68"/>
      <stop offset="1" stop-color="#0f5f9f"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#102033" flood-opacity="0.16"/>
    </filter>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#d9e4ef" stroke-width="1" opacity="0.42"/>
    </pattern>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#grid)" opacity="0.9"/>
  <rect x="70" y="70" width="1140" height="500" rx="42" fill="#ffffff" filter="url(#shadow)"/>

  <g font-family="Inter, Segoe UI, Arial, sans-serif">
    <text x="640" y="162" text-anchor="middle" font-size="62" font-weight="850" fill="#172033">Seafile RAGFlow Connector</text>
    <text x="640" y="212" text-anchor="middle" font-size="25" font-weight="600" fill="#4b5d70">Source-of-truth sync control plane for RAGFlow and OpenWebUI</text>
  </g>

  <g font-family="Inter, Segoe UI, Arial, sans-serif">
    <g transform="translate(216 352)">
      <rect x="-116" y="-72" width="232" height="144" rx="22" fill="#eef6ff" stroke="#1769e0" stroke-width="3"/>
      <text x="0" y="-20" text-anchor="middle" font-size="29" font-weight="800" fill="#172033">Seafile</text>
      <text x="0" y="18" text-anchor="middle" font-size="18" fill="#536173">source of truth</text>
      <text x="0" y="48" text-anchor="middle" font-size="15" fill="#536173">libraries and files</text>
    </g>

    <g transform="translate(640 352)">
      <rect x="-168" y="-94" width="336" height="188" rx="28" fill="url(#control)"/>
      <text x="0" y="-45" text-anchor="middle" font-size="30" font-weight="850" fill="#ffffff">Control Plane</text>
      <text x="0" y="-8" text-anchor="middle" font-size="18" fill="#e9fffb">delta sync, delete propagation, repair</text>
      <text x="0" y="32" text-anchor="middle" font-size="16" font-weight="700" fill="#ffffff">PostgreSQL state • Redis jobs • Audit</text>
      <text x="0" y="62" text-anchor="middle" font-size="15" fill="#e9fffb">Portainer, Compose, Swarm, TLS</text>
    </g>

    <g transform="translate(1064 352)">
      <rect x="-116" y="-72" width="232" height="144" rx="22" fill="#f4fbf7" stroke="#14906f" stroke-width="3"/>
      <text x="0" y="-20" text-anchor="middle" font-size="29" font-weight="800" fill="#172033">RAGFlow</text>
      <text x="0" y="18" text-anchor="middle" font-size="18" fill="#536173">datasets and parsing</text>
      <text x="0" y="48" text-anchor="middle" font-size="15" fill="#536173">OpenWebUI models optional</text>
    </g>

    <path d="M334 352H448" stroke="#1769e0" stroke-width="9" stroke-linecap="round"/>
    <path d="M832 352H946" stroke="#14906f" stroke-width="9" stroke-linecap="round"/>
    <path d="M1062 438C884 490 394 490 216 438" fill="none" stroke="#1769e0" stroke-width="4" stroke-linecap="round" stroke-dasharray="4 13" opacity="0.72"/>
    <rect x="278" y="510" width="724" height="38" rx="19" fill="#eef6ff" stroke="#bed8ff"/>
    <text x="640" y="535" text-anchor="middle" font-size="20" font-weight="750" fill="#1769e0">target drift is rebuilt from Seafile, never written back to Seafile</text>
  </g>
</svg>
