<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">Seafile RAGFlow Connector social preview</title>
  <desc id="desc">Social preview for an offline-first connector between Seafile, RAGFlow and optional OpenWebUI.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f7fbff"/>
      <stop offset="1" stop-color="#edf7f3"/>
    </linearGradient>
    <linearGradient id="rail" x1="0" x2="1">
      <stop offset="0" stop-color="#1f6feb"/>
      <stop offset="0.55" stop-color="#168a6a"/>
      <stop offset="1" stop-color="#6f42c1"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect x="72" y="72" width="1136" height="496" rx="34" fill="#ffffff"/>
  <text x="640" y="182" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="58" font-weight="750" fill="#172033">Seafile RAGFlow Connector</text>
  <text x="640" y="234" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="25" fill="#536173">Offline-first sync control plane for Portainer deployments</text>
  <line x1="248" y1="362" x2="1032" y2="362" stroke="url(#rail)" stroke-width="14" stroke-linecap="round"/>
  <g font-family="Inter, Segoe UI, Arial, sans-serif" text-anchor="middle">
    <g transform="translate(240 362)">
      <rect x="-116" y="-66" width="232" height="132" rx="18" fill="#eef6ff" stroke="#1f6feb" stroke-width="3"/>
      <text y="-8" font-size="25" font-weight="700" fill="#172033">Seafile</text>
      <text y="30" font-size="17" fill="#536173">source of truth</text>
    </g>
    <g transform="translate(640 362)">
      <rect x="-146" y="-80" width="292" height="160" rx="22" fill="#effaf5" stroke="#168a6a" stroke-width="3"/>
      <text y="-16" font-size="27" font-weight="700" fill="#172033">Connector</text>
      <text y="24" font-size="17" fill="#536173">state, jobs, repair</text>
    </g>
    <g transform="translate(1040 362)">
      <rect x="-116" y="-66" width="232" height="132" rx="18" fill="#f6f1ff" stroke="#6f42c1" stroke-width="3"/>
      <text y="-8" font-size="25" font-weight="700" fill="#172033">RAGFlow</text>
      <text y="30" font-size="17" fill="#536173">datasets and parsing</text>
    </g>
  </g>
  <text x="640" y="520" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" fill="#536173">Docker Compose, Portainer, TLS, dashboard and optional OpenWebUI integration</text>
</svg>
