<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="420" viewBox="0 0 1280 420" role="img" aria-labelledby="title desc">
  <title id="title">Seafile RAGFlow Connector</title>
  <desc id="desc">A restrained architecture graphic showing Seafile flowing through the connector to RAGFlow and optional OpenWebUI.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f7fbff"/>
      <stop offset="1" stop-color="#edf7f3"/>
    </linearGradient>
    <linearGradient id="rail" x1="0" x2="1">
      <stop offset="0" stop-color="#1f6feb"/>
      <stop offset="0.55" stop-color="#168a6a"/>
      <stop offset="1" stop-color="#6f42c1"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect width="1280" height="420" rx="28" fill="url(#bg)"/>
  <rect x="42" y="38" width="1196" height="344" rx="24" fill="#ffffff" filter="url(#shadow)"/>
  <text x="640" y="96" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="40" font-weight="700" fill="#172033">Seafile RAGFlow Connector</text>
  <text x="640" y="132" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" fill="#536173">Offline sync control plane for Seafile, RAGFlow and optional OpenWebUI</text>
  <line x1="266" y1="226" x2="1014" y2="226" stroke="url(#rail)" stroke-width="10" stroke-linecap="round"/>
  <g font-family="Inter, Segoe UI, Arial, sans-serif" text-anchor="middle">
    <g transform="translate(234 226)">
      <rect x="-104" y="-56" width="208" height="112" rx="16" fill="#eef6ff" stroke="#1f6feb" stroke-width="2"/>
      <circle cx="-58" cy="-2" r="20" fill="#1f6feb" opacity="0.14"/>
      <path d="M-70 -2h24M-58 -14v24" stroke="#1f6feb" stroke-width="5" stroke-linecap="round"/>
      <text y="-8" font-size="20" font-weight="700" fill="#172033">Seafile</text>
      <text y="24" font-size="14" fill="#536173">source of truth</text>
    </g>
    <g transform="translate(640 226)">
      <rect x="-134" y="-70" width="268" height="140" rx="18" fill="#effaf5" stroke="#168a6a" stroke-width="2"/>
      <rect x="-82" y="-30" width="164" height="20" rx="10" fill="#168a6a" opacity="0.18"/>
      <rect x="-82" y="0" width="164" height="20" rx="10" fill="#168a6a" opacity="0.26"/>
      <text y="-40" font-size="21" font-weight="700" fill="#172033">Connector</text>
      <text y="44" font-size="14" fill="#536173">state, jobs, repair</text>
    </g>
    <g transform="translate(1046 226)">
      <rect x="-104" y="-56" width="208" height="112" rx="16" fill="#f6f1ff" stroke="#6f42c1" stroke-width="2"/>
      <path d="M-64 0c18-28 43-28 61 0s43 28 61 0" fill="none" stroke="#6f42c1" stroke-width="6" stroke-linecap="round"/>
      <text y="-8" font-size="20" font-weight="700" fill="#172033">RAGFlow</text>
      <text y="24" font-size="14" fill="#536173">datasets and parsing</text>
    </g>
  </g>
  <path d="M640 296c78 42 160 42 246 0" fill="none" stroke="#d19a00" stroke-width="4" stroke-linecap="round" stroke-dasharray="1 12"/>
  <text x="766" y="340" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" fill="#725400">optional OpenWebUI tools, pipes and proxy</text>
</svg>
